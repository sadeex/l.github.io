  <style>
    body {
      background: #0f0f0f;

      display: flex;
      align-items: center;

    }

    .yt-btn {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      background: #FF0000;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 18px 36px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 0 24px rgba(255, 0, 0, 0.5), 0 4px 15px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
      border: 2px solid transparent;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
    }

    .yt-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s ease;
    }

    .yt-btn:hover::before {
      left: 100%;
    }

    .yt-btn:hover {
      background: #cc0000;
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.8), 0 8px 25px rgba(0,0,0,0.5);
      transform: translateY(-3px) scale(1.04);
      border-color: rgba(255,255,255,0.2);
    }

    .yt-btn:active {
      transform: translateY(0px) scale(0.98);
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
    }

    .yt-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .pulse-ring {
      position: absolute;
      border-radius: 50px;
      border: 3px solid rgba(255, 0, 0, 0.6);
      animation: pulse 2s ease-out infinite;
      pointer-events: none;
      width: 100%;
      height: 100%;
      top: 0; left: 0;
    }

    @keyframes pulse {
      0%   { transform: scale(1);   opacity: 0.8; }
      100% { transform: scale(1.18); opacity: 0; }
    }
  </style>
</head>
